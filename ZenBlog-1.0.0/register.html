<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .signup-form {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        .signup-form h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        .form-group input, .form-group select {
            width: 90%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .form-group input[type="radio"] {
            width: auto;
            margin-right: 5px;
        }
        .form-actions {
            text-align: center;
        }
        .form-actions button {
            padding: 10px 20px;
            border: none;
            background-color: #5cb85c;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .form-actions button:hover {
            background-color: #4cae4c;
        }
        .hidden {
            display: none;
        }
        .check-button {
            margin-top: 5px;
            padding: 5px 10px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .check-button:hover {
            background-color: #0056b3;
        }
        .inline-checkbox {
            display: inline-block;
            margin-left: 10px;
        }
        .form-group input[type="text"] {
        size: 20px;
    }
        
    </style>
</head>
<body>

<div class="signup-form">
    <h1>회원가입</h1>
    <form id="signupForm">
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" required size="4">
            <button type="button" class="check-button" onclick="checkUsername()">중복확인</button>
            <span id="usernameMessage"></span>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="confirmPassword">비밀번호 재확인</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
            <span id="passwordMessage"></span>
        </div>

        <div class="form-group">
            <label for="email">이메일</label>
            <div style="display: flex; align-items: center;">
                <input type="email" id="email" name="email" placeholder="example@example.com" required style="flex: 1;">
                <button type="button" class="check-button" onclick="checkEmail()" style="margin-left: 10px;">중복확인</button>
                
                <p class="inline-checkbox" style="margin-left: 10px;">
                    <input type="checkbox" id="emailOptIn" name="emailOptIn">
                    <hr> 이메일 수신 동의
                </p>
            </div>
            <span id="emailMessage"></span>
        </div>
        

        <div class="form-group">
            <label for="phone">휴대폰 번호</label>
            <div style="display: flex; align-items: center;">
                <input type="tel" id="phone" name="phone" placeholder="010-1234-5678" required style="flex: 1;">

                <p class="inline-checkbox" style="margin-left: 10px;">
                    <input type="checkbox" id="smsOptIn" name="smsOptIn">
                    <hr> SMS 수신 동의
                </p>
            </div>
        </div>
        

        <div class="form-group">
            <label for="nickname">닉네임</label>
            <input type="text" id="nickname" name="nickname" required>
            <button type="button" class="check-button" onclick="checkNickname()">중복확인</button>
            <span id="nicknameMessage"></span>
        </div>

        <div class="form-group">
            <label>성별</label>
            <input type="radio" id="male" name="gender" value="male">
            <span for="male">남성</span>
            <input type="radio" id="female" name="gender" value="female">
            <span for="female">여성</span>
        </div>

        <div class="form-group">
            <label for="birthday">생일</label>
            <input type="date" id="birthday" name="birthday">
        </div>

        <div class="form-group">
            <label>회원 유형</label>
            <input type="radio" id="individual" name="membership" value="individual" checked>
            <span for="individual">일반회원</span>
            <input type="radio" id="business" name="membership" value="business">
            <span for="business">사업자 회원</span>
        </div>

        <div class="form-group hidden" id="foundingYearGroup">
            <label for="foundingYear">창업년도</label>
            <input type="date" id="foundingYear" name="foundingYear">
        </div>

        <div class="form-group">
            <label for="businessType">업종</label>
            <input type="text" id="businessType" name="businessType" placeholder="예: 한식당, 패밀리레스토랑, 카페" >
        </div>

        <div class="form-actions">
            <button type="submit">회원가입</button>
        </div>
    </form>
    
</div>

<script>
    const individualRadio = document.getElementById('individual');
    const businessRadio = document.getElementById('business');
    const foundingYearGroup = document.getElementById('foundingYearGroup');

    individualRadio.addEventListener('change', toggleFoundingYear);
    businessRadio.addEventListener('change', toggleFoundingYear);

    function toggleFoundingYear() {
        if (businessRadio.checked) {
            foundingYearGroup.classList.remove('hidden');
            document.getElementById('foundingYear').required = true;
        } else {
            foundingYearGroup.classList.add('hidden');
            document.getElementById('foundingYear').required = false;
        }
    }

    // 초기 로드 시 숨기기
    toggleFoundingYear();

    function checkUsername() {
        const username = document.getElementById('username').value;
        const message = document.getElementById('usernameMessage');
        if (username === 'takenUsername') {
            message.textContent = '이미 사용 중인 아이디입니다.';
            message.style.color = 'red';
        } else {
            message.textContent = '사용 가능한 아이디입니다.';
            message.style.color = 'green';
        }
    }

    function checkNickname() {
        const nickname = document.getElementById('nickname').value;
        const message = document.getElementById('nicknameMessage');
        if (nickname === 'takenNickname') {
            message.textContent = '이미 사용 중인 닉네임입니다.';
            message.style.color = 'red';
        } else {
            message.textContent = '사용 가능한 닉네임입니다.';
            message.style.color = 'green';
        }
    }

    function checkEmail() {
        const email = document.getElementById('email').value;
        const message = document.getElementById('emailMessage');
        const existingEmails = ['example1@example.com', 'example2@example.com'];

        if (existingEmails.includes(email)) {
            message.textContent = '이미 사용 중인 이메일입니다.';
            message.style.color = 'red';
        } else {
            message.textContent = '사용 가능한 이메일입니다.';
            message.style.color = 'green';
        }
    }

    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const passwordMessage = document.getElementById('passwordMessage');

    confirmPassword.addEventListener('input', () => {
        if (password.value !== confirmPassword.value) {
            passwordMessage.textContent = '비밀번호가 일치하지 않습니다.';
            passwordMessage.style.color = 'red';
        } else {
            passwordMessage.textContent = '비밀번호가 일치합니다.';
            passwordMessage.style.color = 'green';
        }
    });
</script>

</body>
</html>
