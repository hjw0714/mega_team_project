<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Profile Edit - Food Hub</title>
  <meta name="description" content="">
  <meta name="keywords" content="">

  <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body class="contact-page">
  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="container position-relative d-flex align-items-center justify-content-between">

      <a href="index.html" class="logo d-flex align-items-center me-auto me-xl-0">
        <h1 class="sitename">Food Hub</h1>
      </a>

      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="single-post.html">Single Post</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>

      <div class="header-user d-flex align-items-center">
        <a href="login.html" class="login-btn d-flex align-items-center">
          <i class="bi bi-person-circle me-1"></i> 로그아웃
        </a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container mt-5">
      <h3 class="mb-4">프로필 수정</h3>
      <form>
        <!-- Profile Picture Update -->
        <div class="mb-3 text-center">
          <label for="profilePicture" class="form-label">프로필 사진</label>
          <div class="profile-picture-container">
            <img src="assets/img/default-profile.png" alt="Profile Picture" id="currentProfilePicture" class="img-thumbnail" style="cursor: pointer; max-width: 150px;">
          </div>
          <input type="file" class="form-control mt-2" id="profilePicture" style="display: none;">
        </div>

        <!-- Nickname Update -->
        <div class="mb-3">
          <label for="nickname" class="form-label">닉네임</label>
          <input type="text" class="form-control" id="nickname" value="기존 닉네임">
        </div>

        <!-- Email Update -->
        <div class="mb-3">
          <label for="email" class="form-label">이메일</label>
          <input type="email" class="form-control" id="email" value="example@example.com">
        </div>

        <!-- Phone Number Update -->
        <div class="mb-3">
          <label for="phone" class="form-label">휴대폰 번호</label>
          <input type="tel" class="form-control" id="phone" value="010-1234-5678">
        </div>

        <!-- Industry Update -->
        <div class="mb-3">
          <label for="industry" class="form-label">업종</label>
          <input type="text" class="form-control" id="industry" value="기존 업종 정보">
        </div>

        <!-- Notifications Consent -->
        <h4 class="mt-4">알림 수신 동의</h4>
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="smsNotifications" checked>
          <label for="smsNotifications" class="form-check-label">SMS 수신동의</label>
        </div>
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="emailNotifications">
          <label for="emailNotifications" class="form-check-label">Email 수신동의</label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary mt-3">프로필 수정</button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('currentProfilePicture').addEventListener('click', function() {
      document.getElementById('profilePicture').click();
    });
  </script>

  <!-- Vendor JS Files -->
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>

  <!-- Main JS File -->
  <script src="assets/js/main.js"></script>
</body>

</html>
